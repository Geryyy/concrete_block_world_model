# Staging blocks for wall-assembly pick-and-place.
#
# ONE source of truth for both Gazebo and the world model:
#   * world_model_node reads `world_model.initial_blocks` from here (markers + GetCoarseBlocks)
#   * gazebo_block_spawner.py reads the same `initial_blocks` and spawns each in Gazebo
#
# FRAME: world. The whole CBS stack (wall_spec, wall plan, world model, viz) lives in
# `world`; the single world -> K0_mounting_base conversion happens in the
# GetNextAssemblyTask BT plugin. Keep this seed in the SAME frame as wall_spec_example.yaml.
#
# Block IDs MUST match the wall plan being built (see wall_plans.yaml: example_wall).
# Block dimensions: 0.9 x 0.6 x 0.6 m (X=depth, Y, Z=height).
# Positions sampled on flat terrain (z = terrain_z + 0.3 block half-height).
world_model_node:
  ros__parameters:
    world_frame: world
    world_model:
      initial_blocks: |
        - id: c0_b0
          frame_id: world
          position: [-11.0, 0, 0.3]
          yaw_deg: 0.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
        - id: c0_b1
          frame_id: world
          position: [-13.0, 0, 0.3]
          yaw_deg: 0.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
        - id: c0_b2
          frame_id: world
          position: [-15, 0, 0.3]
          yaw_deg: 0.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
        - id: c1_b0
          frame_id: world
          position: [-11, -1.500, 0.3]
          yaw_deg: 0.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
        - id: c1_b1
          frame_id: world
          position: [-13, -1.500, 0.3]
          yaw_deg: 0.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
