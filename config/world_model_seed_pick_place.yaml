# Two blocks for pick-and-place testing.
# Positions in the world frame (stack-wide planning reference frame).
# Block dimensions: 0.9 x 0.6 x 0.6 m (X=depth, Y, Z=height).
#
# Positions chosen to lie on flat terrain in the seibersdorf_environment.
# Flat-terrain scan (terrain z sampled from mesh):
#   block_1: world=(-11.439, 0.100)  terrain_z=-0.119 m
#   block_2: world=(-12.939, 0.100)  terrain_z=-0.104 m
#
# block z calculation:
#   z_world_block_center = terrain_z + 0.3 (half block height)
#   → block_1 z_world = -0.119 + 0.3 = 0.181
#   → block_2 z_world = -0.104 + 0.3 = 0.196
#
# Reference: T_world_K0: translation=[-6.939, 0.350, 1.141], yaw=180 deg
#   (tf2_echo world K0_mounting_base). K0 conversion is now done downstream at
#   the motion-planning boundary, not here.
#
# Gazebo world poses (spawn z raised +0.3 m so blocks fall onto terrain):
#   z_gz = terrain_z + 0.6
world_model_node:
  ros__parameters:
    world_frame: world
    world_model:
      initial_blocks: |
        - id: block_1
          frame_id: world
          position: [-11.439, 0.100, 0.181]
          yaw_deg: 180.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
          gazebo_pose: [-11.439, 0.100, 0.481, 0.0, 0.0, 180.0]
        - id: block_2
          frame_id: world
          position: [-12.939, 0.100, 0.196]
          yaw_deg: 180.0
          pose_status: POSE_PRECISE
          task_status: TASK_FREE
          confidence: 1.0
          gazebo_pose: [-12.939, 0.100, 0.496, 0.0, 0.0, 180.0]
